<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Set your pickleball court appointment. Fill out the form to reserve your spot.">
  <title>Set Appointment - Pickleball Club</title>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --blue: #a8d8ea;
      --green: #4caf82;
      --green-dark: #2e8b60;
      --pink: #e87585;
      --pink-dark: #d44f62;
      --white: #ffffff;
      --text-dark: #1a2e35;
      --text-light: #4a5e6a;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text-dark);
      background-color: #f0f4f2;
      max-width: 1280px;
      margin: 0 auto;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 40px;
      background-color: var(--white);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo img {
      border-radius: 50%;
      border: none;
    }

    .logo h1 {
      font-size: 1.3rem;
      color: var(--pink-dark);
      font-weight: 700;
      line-height: 1.2;
    }

    .logo h1 span {
      display: block;
      font-size: 0.85rem;
      color: var(--green-dark);
      font-weight: 600;
    }

    .btn-back {
      display: inline-block;
      padding: 10px 22px;
      background-color: var(--pink);
      color: var(--text-dark);
      font-weight: 600;
      border-radius: 25px;
      transition: background-color 0.3s, transform 0.2s;
    }

    .btn-back:hover {
      background-color: var(--pink-dark);
      color: var(--white);
      transform: translateY(-2px);
    }

    /* Main content */
    .form-section {
      padding: 40px;
      text-align: center;
    }

    .form-section h2 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: var(--text-dark);
    }

    .form-section p {
      font-size: 1rem;
      color: var(--text-light);
      margin-bottom: 30px;
    }

    .form-container {
      width: 100%;
      max-width: 800px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    .form-container iframe {
      width: 100%;
      height: 900px;
      border: none;
    }

    /* Footer */
    footer {
      padding: 30px 40px;
      background-color: var(--text-dark);
      color: var(--white);
      text-align: center;
    }

    footer p {
      font-size: 0.9rem;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="logo">
      <img src="images/logo.webp" alt="Pickleball Club Logo" width="60" height="60">
      <h1>Pickleball <span>Club</span></h1>
    </a>
    <a href="index.html" class="btn-back">Back to Home</a>
  </header>

  <main class="form-section">
    <h2>Set Your Appointment</h2>
    <p>Fill out the form below to reserve your pickleball court. We'll confirm your booking via email.</p>

    <div class="form-container">
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc64ffvLEOd9EkMJulQxqoyX_N3N2lvFtuZ_cuKP_iGYoBsqg/viewform?embedded=true" title="Pickleball Club Appointment Form" loading="lazy">Loading…</iframe>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 Pickleball Club. All rights reserved.</p>
  </footer>

</body>
</html>
